<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#0f1117;color:#e2e8f0;display:flex;flex-direction:column;height:100vh;overflow:hidden}
/* Toolbar */
.tb{display:flex;align-items:center;gap:10px;padding:9px 16px;background:#1a1f2e;border-bottom:1px solid #2d3748;flex-shrink:0;flex-wrap:wrap}
.tb h1{font-size:.85rem;font-weight:700;color:#7dd3fc;white-space:nowrap}
.sp{flex:1}
.chg{font-size:.7rem;background:#92400e;color:#fbbf24;padding:2px 8px;border-radius:4px;display:none}
.btn{padding:6px 14px;border-radius:5px;border:none;font-size:.75rem;font-weight:700;cursor:pointer;font-family:inherit}
.btn-r{background:#374151;color:#9ca3af}.btn-r:hover{background:#4b5563;color:#e2e8f0}
.btn-d{background:#059669;color:#fff}.btn-d:hover{background:#047857}
/* Layout */
.main{display:flex;flex:1;overflow:hidden}
/* Panel */
.panel{width:310px;min-width:260px;background:#151b27;border-right:1px solid #2d3748;display:flex;flex-direction:column;flex-shrink:0}
.tabs{display:flex;border-bottom:1px solid #2d3748;flex-shrink:0}
.tab{flex:1;padding:7px 3px;font-size:.65rem;font-weight:700;text-align:center;cursor:pointer;color:#64748b;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab.on{color:#7dd3fc;border-bottom-color:#3b82f6;background:#1a2035}
.tab:hover:not(.on){color:#94a3b8}
.body{flex:1;overflow-y:auto;padding:12px}
.body::-webkit-scrollbar{width:4px}
.body::-webkit-scrollbar-thumb{background:#374151;border-radius:2px}
.field{margin-bottom:10px}
.field label{display:block;font-size:.67rem;color:#64748b;margin-bottom:3px;font-weight:600}
.field input,.field textarea{width:100%;background:#1e293b;border:1px solid #2d3748;border-radius:4px;color:#e2e8f0;font-size:.78rem;padding:5px 8px;font-family:inherit;line-height:1.5;resize:vertical;transition:border-color .15s}
.field input:focus,.field textarea:focus{outline:none;border-color:#3b82f6}
.field input.mod,.field textarea.mod{border-color:#f59e0b;background:#1c1a10}
/* Preview */
.preview{flex:1;display:flex;flex-direction:column;overflow:hidden}
.pb{display:flex;align-items:center;gap:8px;padding:5px 12px;background:#1a1f2e;border-bottom:1px solid #2d3748;flex-shrink:0}
.pb span{font-size:.7rem;color:#64748b}
.zm{display:flex;gap:4px;align-items:center;margin-left:auto}
.zbtn{background:#2d3748;border:none;color:#94a3b8;width:22px;height:22px;border-radius:3px;cursor:pointer;font-size:.85rem;line-height:1}
.zbtn:hover{background:#374151;color:#e2e8f0}
.zl{font-size:.7rem;color:#64748b;min-width:34px;text-align:center}
.wrap{flex:1;overflow:auto;background:#555}
iframe{border:none;background:#fff;transform-origin:top left;display:block}
</style>

<div class="field"><label>目的 › リード文</label><textarea id="f-purpose_lead" oninput="upd(this)" rows="3">独立研究ネットワークTAGENは、所属、経歴、年齢、国籍、研究領域を越え、誰もが知的探求を実践できる「場」を拓くことを目指す集まりです。</textarea></div>
<div class="field"><label>目的 › 本文</label><textarea id="f-purpose_body" oninput="upd(this)" rows="3">組織に属しているか否かにかかわらず、すべての「精神的に自立した探求者」が既存の境界を越えて出会い、みずから「学びのかたち」を企画する、能動的なプロセスを育むことを通して、豊かな研究文化の環境づくりに貢献することを目的としています。</textarea></div>

function b64dec(s){
  const bin = atob(s);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}
const ORIG = b64dec(B64);

// [id, 元テキスト]
const FIELDS = [["hero_badge", "Independent Researchers Network"], ["hero_h1", "独立研究ネットワーク"], ["hero_accent", "TAGEN"], ["hero_catch1", "みずから「学びのかたち」を企画する…"], ["hero_catch2", "境界を超えた先にある、新しい共働の「場」づくりへ"], ["news_title", "最新情報"], ["about_title", "TAGENとは"], ["about_sub", "多元の知を探究する学びの企画集団"], ["purpose_head", "目的"], ["purpose_lead", "独立研究ネットワークTAGENは、所属、経歴、年齢、国籍、研究領域を越え、誰もが知的探求を実践できる「場」を拓くことを目指す集まりです。"], ["purpose_body", "組織に属しているか否かにかかわらず、すべての「精神的に自立した探求者」が既存の境界を越えて出会い、みずから「学びのかたち」を企画する、能動的なプロセスを育むことを通して、豊かな研究文化の環境づくりに貢献することを目的としています。"], ["btn1", "「TAGEN」のコンセプト"], ["btn2", "Official Note"], ["act_head", "活動内容"], ["act1_title", "知の交流と企画支援"], ["act1_desc", "研究プロジェクト、勉強会、講演会、ワークショップの企画・運営"], ["act2_title", "在野の知の発掘と架橋"], ["act2_desc", "既存の領域外で「知」を模索するプレイヤーとのネットワークづくり"], ["act3_title", "動的な発信プラットフォーム"], ["act3_desc", "研究経過を発信し、成果を記録するためのメディア運営"], ["act4_title", "自由のためのガイドライン"], ["act4_desc", "研究活動における倫理的課題の解決に誠実に向き合うための指針づくり"], ["proj_title", "TAGENのプロジェクト"], ["proj_sub", "みんなの「学びたい」を実現する場"], ["mem_title", "TAGENの世話人"], ["mem_sub", "学びの企画をなかだちするメディエイター"], ["footer_name", "独立研究ネットワークTAGEN"], ["footer_eng", "Independent Researchers Network"], ["footer_copy", "2026 Independent Researchers Network TAGEN."]];

// 初期値セット
FIELDS.forEach(([id, val]) => {
  const el = document.getElementById('f-' + id);
  if(el) el.value = val;
});

const changes = {};
let zl = 70, timer = null;

function buildHTML(){
  let html = ORIG;
  FIELDS.forEach(([id, orig]) => {
    const el = document.getElementById('f-' + id);
    if(!el || el.value === orig) return;
    // 全箇所を置換（splitで安全に）
    html = html.split(orig).join(el.value);
  });
  return html;
}

function renderPreview(){
  const blob = new Blob([buildHTML()], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const fr = document.getElementById('fr');
  const old = fr.src;
  fr.src = url;
  if(old && old.startsWith('blob:')) setTimeout(()=>URL.revokeObjectURL(old), 1000);
  applyZoom();
}

function applyZoom(){
  const fr = document.getElementById('fr');
  const s = zl/100;
  fr.style.width = '1440px';
  fr.style.height = '900px';
  fr.style.transform = 'scale('+s+')';
  fr.style.transformOrigin = 'top left';
  document.getElementById('wrap').style.minHeight = (900*s)+'px';
}

function zoom(d){
  zl = Math.min(120, Math.max(30, zl+d));
  document.getElementById('zl').textContent = zl+'%';
  applyZoom();
}

function upd(el){
  const row = FIELDS.find(f => f[0] === el.id.replace('f-',''));
  if(!row) return;
  const mod = el.value !== row[1];
  el.classList.toggle('mod', mod);
  changes[el.id] = mod;
  document.getElementById('chg').style.display =
    Object.values(changes).some(Boolean) ? 'inline-block' : 'none';
  clearTimeout(timer);
  timer = setTimeout(renderPreview, 250);
}

function resetAll(){
  FIELDS.forEach(([id, val]) => {
    const el = document.getElementById('f-' + id);
    if(!el) return;
    el.value = val;
    el.classList.remove('mod');
    changes['f-'+id] = false;
  });
  document.getElementById('chg').style.display = 'none';
  renderPreview();
}

function dlHTML(){
  const blob = new Blob([buildHTML()], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index.html';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}

function showTab(n){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===n));
  [0,1,2,3].forEach(i=>{
    const el = document.getElementById('tab-'+i);
    if(el) el.style.display = i===n ? 'block' : 'none';
  });
}

window.addEventListener('load', ()=>{ applyZoom(); renderPreview(); });
window.addEventListener('resize', applyZoom);
</script>
