<div class="field"><label>目的 › リード文</label><textarea id="f-purpose_lead" oninput="upd(this)" rows="3">独立研究ネットワークTAGENは、所属、経歴、年齢、国籍、研究領域を越え、誰もが知的探求を実践できる「場」を拓くことを目指す集まりです。</textarea></div>
<div class="field"><label>目的 › 本文</label><textarea id="f-purpose_body" oninput="upd(this)" rows="3">組織に属しているか否かにかかわらず、すべての「精神的に自立した探求者」が既存の境界を越えて出会い、みずから「学びのかたち」を企画する、能動的なプロセスを育むことを通して、豊かな研究文化の環境づくりに貢献することを目的としています。</textarea></div>

function b64dec(s){
  const bin = atob(s);
  const b = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) b[i]=bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(b);
}

FIELDS.forEach(([id, val]) => {
  const el = document.getElementById('f-' + id);
  if(el) el.value = val;
});

const changes = {};
let zl = 100, timer = null;

function buildHTML(){
  let html = ORIG;
  FIELDS.forEach(([id, orig]) => {
    const el = document.getElementById('f-' + id);
    if(!el || el.value === orig) return;
    html = html.split(orig).join(el.value);
  });
  return html;
}

function renderPreview(){
  const blob = new Blob([buildHTML()], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const fr = document.getElementById('fr');
  const old = fr.src;
  fr.src = url;
  if(old && old.startsWith('blob:')) setTimeout(()=>URL.revokeObjectURL(old), 1000);
  applyZoom();
}

function applyZoom(){
  const fr = document.getElementById('fr');
  const s = zl/100;
  fr.style.width = '1440px';
  fr.style.height = '900px';
  fr.style.transform = 'scale('+s+')';
  fr.style.transformOrigin = 'top left';
  document.getElementById('wrap').style.minHeight = (900*s)+'px';
}

function zoom(d){
  zl = Math.min(120, Math.max(30, zl+d));
  document.getElementById('zl').textContent = zl+'%';
  applyZoom();
}

function upd(el){
  const row = FIELDS.find(f => f[0] === el.id.replace('f-',''));
  if(!row) return;
  const mod = el.value !== row[1];
  el.classList.toggle('mod', mod);
  changes[el.id] = mod;
  document.getElementById('chg').style.display =
    Object.values(changes).some(Boolean) ? 'inline-block' : 'none';
  clearTimeout(timer);
  timer = setTimeout(renderPreview, 250);
}

function resetAll(){
  FIELDS.forEach(([id, val]) => {
    const el = document.getElementById('f-' + id);
    if(!el) return;
    el.value = val;
    el.classList.remove('mod');
    changes['f-'+id] = false;
  });
  document.getElementById('chg').style.display = 'none';
  renderPreview();
}

function dlHTML(){
  const blob = new Blob([buildHTML()], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index.html';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}

function showTab(n){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===n));
  [0,1,2,3].forEach(i=>{
    const el = document.getElementById('tab-'+i);
    if(el) el.style.display = i===n ? 'block' : 'none';
  });
}

window.addEventListener('load', ()=>{ applyZoom(); renderPreview(); });
window.addEventListener('resize', applyZoom);
